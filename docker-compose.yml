# ═══════════════════════════════════════════════════
# Docker Compose — Middleware Selection
# Tek komutla ayağa kaldırma: docker-compose up --build
# ═══════════════════════════════════════════════════

version: "3.9"

services:
  # ─── Redis (Rate Limiter + Token Revocation) ────
  redis:
    image: redis:7-alpine
    container_name: mw_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Uygulama Sunucusu ─────────────────────────
  app:
    build: .
    container_name: mw_app
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis_data:
